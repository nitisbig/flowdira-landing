<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#f1ebe0"/>
  <rect width="1200" height="630" fill="url(#warm)"/>

  <!-- sunburst -->
  <g transform="translate(980 120)" opacity="0.5">
    <g id="rays" fill="#c9a86a">
      <rect x="-1.4" y="-260" width="2.8" height="150"/>
    </g>
    <use href="#rays" transform="rotate(20)"/>
    <use href="#rays" transform="rotate(40)"/>
    <use href="#rays" transform="rotate(60)"/>
    <use href="#rays" transform="rotate(80)"/>
    <use href="#rays" transform="rotate(100)"/>
    <use href="#rays" transform="rotate(120)"/>
    <use href="#rays" transform="rotate(140)"/>
    <use href="#rays" transform="rotate(160)"/>
    <use href="#rays" transform="rotate(180)"/>
    <use href="#rays" transform="rotate(200)"/>
    <use href="#rays" transform="rotate(220)"/>
    <use href="#rays" transform="rotate(240)"/>
    <use href="#rays" transform="rotate(260)"/>
    <use href="#rays" transform="rotate(280)"/>
    <use href="#rays" transform="rotate(300)"/>
    <use href="#rays" transform="rotate(320)"/>
    <use href="#rays" transform="rotate(340)"/>
  </g>

  <!-- brand -->
  <g transform="translate(80 86)">
    <rect width="56" height="56" rx="15" fill="#1f3d2e"/>
    <path d="M28 13c1.4 8.4 5.6 12.6 14 14-8.4 1.4-12.6 5.6-14 14-1.4-8.4-5.6-12.6-14-14 8.4-1.4 12.6-5.6 14-14Z" fill="#c9a86a"/>
    <text x="74" y="38" font-family="Georgia, serif" font-size="34" font-weight="600" fill="#16140d" letter-spacing="-1">Flowdira</text>
  </g>

  <!-- headline -->
  <text x="80" y="300" font-family="Georgia, serif" font-size="78" font-weight="600" fill="#16140d" letter-spacing="-3">Design-led websites,</text>
  <text x="80" y="392" font-family="Georgia, serif" font-size="78" font-weight="600" letter-spacing="-3"><tspan font-style="italic" fill="#1f3d2e">intelligently</tspan><tspan fill="#16140d"> built.</tspan></text>

  <!-- subline -->
  <text x="82" y="452" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#6c6555">Website design · development · AI integration — shipped from GitHub to Vercel.</text>

  <!-- pills -->
  <g transform="translate(82 506)" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600">
    <rect width="190" height="50" rx="25" fill="#1f3d2e"/>
    <text x="95" y="32" fill="#ede7d8" text-anchor="middle">Start a project</text>
    <rect x="208" width="230" height="50" rx="25" fill="none" stroke="#16140d" stroke-opacity="0.2"/>
    <text x="323" y="32" fill="#16140d" text-anchor="middle">flowdira.com</text>
  </g>
</svg>
